name: Backup D1 Database → R2

# 매일 15:00 UTC = 한국 자정(KST 00:00) 자동 실행
# R2 lifecycle rule: 30일 이후 자동 만료 (아래 setup-lifecycle 잡 참고)

on:
  schedule:
    - cron: '0 15 * * *'
  workflow_dispatch:
    inputs:
      date_override:
        description: '백업 날짜 덮어쓰기 (YYYY-MM-DD, 빈 칸이면 오늘)'
        required: false
        default: ''

jobs:
  # ─────────────────────────────────────────────────────────────────
  # 1. D1 export → R2 업로드
  # ─────────────────────────────────────────────────────────────────
  backup:
    name: D1 Export → R2
    runs-on: ubuntu-latest
    timeout-minutes: 20

    permissions:
      contents: read

    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set backup date
        id: date
        run: |
          if [ -n "${{ github.event.inputs.date_override }}" ]; then
            echo "date=${{ github.event.inputs.date_override }}" >> "$GITHUB_OUTPUT"
          else
            echo "date=$(date -u +%Y-%m-%d)" >> "$GITHUB_OUTPUT"
          fi

      - name: Install wrangler
        run: npm install -g wrangler@latest

      - name: Export D1 to SQL file
        run: |
          wrangler d1 export nihongo-n3-prod \
            --remote \
            --output=backup.sql \
            --config=apps/api/wrangler.toml

      - name: Verify export file size
        run: |
          SIZE=$(wc -c < backup.sql)
          echo "백업 파일 크기: ${SIZE} bytes"
          # 최소 1KB 이상이어야 정상 백업으로 간주
          [ "$SIZE" -gt 1024 ] || (echo "❌ 백업 파일이 너무 작습니다 (${SIZE}B). 내용을 확인하세요." && exit 1)

      - name: Upload backup to R2
        run: |
          wrangler r2 object put \
            "${{ secrets.R2_REPORTS_BUCKET_NAME }}/backups/${{ steps.date.outputs.date }}.sql" \
            --file=backup.sql \
            --content-type="application/sql"

      - name: Confirm upload
        run: |
          echo "✅ 백업 완료: backups/${{ steps.date.outputs.date }}.sql → R2"

  # ─────────────────────────────────────────────────────────────────
  # 2. R2 lifecycle rule 설정 (30일 자동 만료)
  #    최초 1회만 실행 — 이후에는 skip (ETag 기반 체크)
  # ─────────────────────────────────────────────────────────────────
  setup-lifecycle:
    name: Set R2 Lifecycle Rule (30d)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # 30일 rule은 멱등성 보장 — 매 실행마다 덮어쓰기 가능
    needs: backup

    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

    steps:
      - name: Apply R2 lifecycle rule (backups/ prefix, 30d expiration)
        # Cloudflare API: PUT /accounts/{acct}/r2/buckets/{bucket}/lifecycle
        # 문서: https://developers.cloudflare.com/api/resources/r2/subresources/buckets/subresources/lifecycle/
        # ⚠️  PII 마스킹: 이 버킷은 SQL 덤프를 저장하므로 access log에
        #      개인 식별 정보(이메일, userId)가 포함될 수 있습니다.
        #      Logpush를 설정할 경우 해당 버킷은 제외하거나
        #      쿼리 파라미터/패스에서 userId를 마스킹하세요.
        run: |
          curl -s -X PUT \
            "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/r2/buckets/${{ secrets.R2_REPORTS_BUCKET_NAME }}/lifecycle" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            -H "Content-Type: application/json" \
            -d '{
              "rules": [
                {
                  "id": "backups-30d-expiry",
                  "filter": { "prefix": "backups/" },
                  "expiration": { "days": 30 },
                  "enabled": true
                }
              ]
            }' | jq -e '.success == true' \
          || (echo "❌ lifecycle rule 설정 실패. CF API 응답을 확인하세요." && exit 1)
          echo "✅ R2 lifecycle rule (backups/ 30d) 설정 완료"
